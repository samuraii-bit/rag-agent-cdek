# CdekStart RAG agent - run with a single command:
#   docker-compose up --build
#
# Default LLM: local Ollama with Qwen2.5:3b. The model is pulled
# automatically on first startup (~1.9 GB) and cached in a Docker volume.
# Subsequent starts are instant.
#
# To switch to OpenAI (gpt-4o-mini) for higher quality, see README.

services:
  # ----- Local LLM server (Ollama) ------------------------------------------
  ollama:
    image: ollama/ollama:0.4.4
    container_name: cdekstart-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----- One-shot init container that pre-pulls the default model -----------
  ollama-pull:
    image: ollama/ollama:0.4.4
    container_name: cdekstart-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama-data:/root/.ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    # Pull only if the model is not already cached (idempotent).
    command:
      - |
        set -e
        MODEL="${LLM_MODEL:-qwen2.5:3b}"
        if ollama list | grep -q "$$MODEL"; then
          echo "Model $$MODEL already present, skipping pull."
        else
          echo "Pulling $$MODEL ..."
          ollama pull "$$MODEL"
        fi
        echo "Model ready."
    restart: "no"

  # ----- FastAPI + LangGraph agent ------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: cdekstart-rag:latest
    container_name: cdekstart-rag-api
    restart: unless-stopped
    depends_on:
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:3b}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      CHROMA_PERSIST_DIR: /app/chroma_db
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-cdekstart_kb}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-4}
      KB_DATA_DIR: /app/data
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - chroma-data:/app/chroma_db
      - hf-cache:/home/appuser/.cache/huggingface
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  ollama-data:
  chroma-data:
  hf-cache:
